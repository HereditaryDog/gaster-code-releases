name: Release Desktop

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean
      include_windows:
        description: 'Also build Windows x64. Requires GitHub Actions billing capacity.'
        required: false
        default: false
        type: boolean
      include_linux_arm64:
        description: 'Also build Linux ARM64. Requires GitHub Actions billing capacity.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-matrix:
    name: Prepare release matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Build matrix
        id: matrix
        shell: bash
        env:
          INCLUDE_WINDOWS: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.include_windows) }}
          INCLUDE_LINUX_ARM64: ${{ github.event_name == 'workflow_dispatch' && inputs.include_linux_arm64 || false }}
        run: |
          MATRIX=$(jq -nc \
            --argjson include_windows "$INCLUDE_WINDOWS" \
            --argjson include_linux_arm64 "$INCLUDE_LINUX_ARM64" \
            '[
              {
                platform: "macos-latest",
                rust_target: "aarch64-apple-darwin",
                tauri_args: "--target aarch64-apple-darwin",
                label: "macOS-ARM64",
                asset_name_pattern: "Gaster-Code_[version]_macos_arm64_[bundle][ext]"
              },
              {
                platform: "macos-latest",
                rust_target: "x86_64-apple-darwin",
                tauri_args: "--target x86_64-apple-darwin",
                label: "macOS-x64",
                asset_name_pattern: "Gaster-Code_[version]_macos_x64_[bundle][ext]"
              },
              {
                platform: "ubuntu-22.04",
                rust_target: "x86_64-unknown-linux-gnu",
                tauri_args: "--bundles deb",
                label: "Linux-x64",
                asset_name_pattern: "Gaster-Code_[version]_linux_x64_[bundle][ext]"
              }
            ]
            + (if $include_linux_arm64 then [{
                platform: "ubuntu-22.04-arm",
                rust_target: "aarch64-unknown-linux-gnu",
                tauri_args: "--bundles deb",
                label: "Linux-ARM64",
                asset_name_pattern: "Gaster-Code_[version]_linux_arm64_[bundle][ext]"
              }] else [] end)
            + (if $include_windows then [{
                platform: "windows-latest",
                rust_target: "x86_64-pc-windows-msvc",
                tauri_args: "--bundles nsis",
                label: "Windows-x64",
                asset_name_pattern: "Gaster-Code_[version]_windows_x64_[bundle][ext]"
              }] else [] end)
            | {include: .}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    needs: release-matrix
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.release-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' desktop/src-tauri/tauri.conf.json)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches version
        if: github.event_name == 'push'
        shell: bash
        run: |
          EXPECTED_TAG="v${{ steps.version.outputs.value }}"
          if [ "${GITHUB_REF_NAME}" != "$EXPECTED_TAG" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match app version ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Load release notes
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="release-notes/v${{ steps.version.outputs.value }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Missing release notes file: $NOTES_FILE"
            exit 1
          fi

          {
            echo 'body<<__RELEASE_NOTES__'
            cat "$NOTES_FILE"
            echo
            echo '__RELEASE_NOTES__'
          } >> "$GITHUB_OUTPUT"

      # ── System dependencies (Linux) ──────────────────────────
      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      # ── Bun ──────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Node.js (for tauri-action compatibility) ─────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      # ── Rust ─────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'desktop/src-tauri -> target'
          shared-key: ${{ matrix.rust_target }}

      # ── Install dependencies ─────────────────────────────────
      - name: Install root dependencies
        run: bun install

      - name: Install desktop dependencies
        working-directory: desktop
        run: bun install

      - name: Install adapter dependencies
        working-directory: adapters
        run: bun install

      # ── Build sidecars ───────────────────────────────────────
      - name: Build sidecars
        working-directory: desktop
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.rust_target }}
        run: bun run build:sidecars

      # ── Build Tauri app ──────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          BUN_INSTALL_CACHE_DIR: ${{ runner.temp }}/bun-install-cache
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.rust_target }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tauriScript: bunx tauri
          tagName: v__VERSION__
          releaseName: 'Gaster Code v__VERSION__'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: false
          updaterJsonPreferNsis: true
          assetNamePattern: ${{ matrix.asset_name_pattern }}
          args: ${{ matrix.tauri_args }} --ci --config src-tauri/tauri.release-ci.json

  public-release:
    name: Publish public release assets
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.draft == false)
    permissions:
      contents: read
    env:
      PRIVATE_RELEASE_REPOSITORY: ${{ github.repository }}
      PUBLIC_RELEASE_REPOSITORY: HereditaryDog/gaster-code-releases
      GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' desktop/src-tauri/tauri.conf.json)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate public release token
        shell: bash
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing PUBLIC_RELEASE_TOKEN. Add a GitHub token that can read ${PRIVATE_RELEASE_REPOSITORY} releases and write ${PUBLIC_RELEASE_REPOSITORY} releases."
            exit 1
          fi

      - name: Validate release notes
        shell: bash
        run: |
          NOTES_FILE="release-notes/${{ steps.version.outputs.tag }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Missing release notes file: $NOTES_FILE"
            exit 1
          fi

      - name: Download private release assets
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p public-release-assets
          gh release download "$TAG" \
            --repo "$PRIVATE_RELEASE_REPOSITORY" \
            --dir public-release-assets

          if [ ! -f public-release-assets/latest.json ]; then
            echo "::error::Missing updater manifest latest.json in private release assets"
            exit 1
          fi

          PRIVATE_ASSET_BASE="https://github.com/${PRIVATE_RELEASE_REPOSITORY}/releases/download/${TAG}/"
          PUBLIC_ASSET_BASE="https://github.com/${PUBLIC_RELEASE_REPOSITORY}/releases/download/${TAG}/"

          jq \
            --arg private "$PRIVATE_ASSET_BASE" \
            --arg public "$PUBLIC_ASSET_BASE" \
            '.platforms |= with_entries(.value.url |= if startswith($private) then $public + (.[($private | length):]) else . end)' \
            public-release-assets/latest.json > public-release-assets/latest.public.json
          mv public-release-assets/latest.public.json public-release-assets/latest.json

          jq -e \
            --arg private "$PRIVATE_ASSET_BASE" \
            --arg public "$PUBLIC_ASSET_BASE" \
            '.platforms | to_entries | all(.value.url | (startswith($public) and (startswith($private) | not)))' \
            public-release-assets/latest.json >/dev/null

      - name: Publish assets to public release repository
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES_FILE="release-notes/$TAG.md"
          TITLE="Gaster Code $TAG"

          if gh release view "$TAG" --repo "$PUBLIC_RELEASE_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$PUBLIC_RELEASE_REPOSITORY" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest
          else
            gh release create "$TAG" \
              --repo "$PUBLIC_RELEASE_REPOSITORY" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --latest
          fi

          gh release upload "$TAG" public-release-assets/* \
            --repo "$PUBLIC_RELEASE_REPOSITORY" \
            --clobber
